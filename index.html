<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa de Startups – Curitiba / PR</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <!-- MarkerCluster CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    header {
      padding: 10px 18px;
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e94560;
      letter-spacing: 0.5px;
    }

    header .subtitle {
      font-size: 0.75rem;
      color: #888;
    }

    #controls {
      padding: 8px 14px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    #search {
      flex: 1;
      min-width: 180px;
      max-width: 340px;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: #0f3460;
      color: #e0e0e0;
      font-size: 0.85rem;
      outline: none;
    }
    #search::placeholder { color: #666; }
    #search:focus { border-color: #e94560; }

    #count {
      font-size: 0.78rem;
      color: #aaa;
      white-space: nowrap;
    }

    #map {
      flex: 1;
      width: 100%;
    }

    /* Popup personalizado */
    .leaflet-popup-content-wrapper {
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      border-radius: 8px;
    }
    .leaflet-popup-tip { background: #16213e; }
    .popup-nome {
      font-weight: 700;
      font-size: 0.95rem;
      color: #e94560;
      margin-bottom: 4px;
    }
    .popup-row {
      font-size: 0.78rem;
      color: #bbb;
      margin-top: 2px;
    }
    .popup-row span { color: #e0e0e0; }

    #loading {
      position: fixed;
      inset: 0;
      background: rgba(26,26,46,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 14px;
    }
    #loading p { font-size: 1rem; color: #e0e0e0; }
    .spinner {
      width: 42px; height: 42px;
      border: 4px solid #0f3460;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <p>Carregando startups de Curitiba…</p>
  </div>

  <header>
    <div>
      <h1>🗺 Mapa de Startups — Curitiba / PR</h1>
      <div class="subtitle">Ecossistema de inovação de Curitiba</div>
    </div>
  </header>

  <div id="controls">
    <input id="search" type="text" placeholder="Buscar startup ou área de atuação…" />
    <div id="count">Carregando…</div>
  </div>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <!-- MarkerCluster JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>

  <script>
    // ── Mapa centrado em Curitiba ────────────────────────────────
    const map = L.map('map', {
      center: [-25.4284, -49.2733],
      zoom: 12,
      zoomControl: true,
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap contributors © CARTO',
      maxZoom: 19,
    }).addTo(map);

    // ── Ícone customizado ────────────────────────────────────────
    const icon = L.divIcon({
      className: '',
      html: '<div style="width:10px;height:10px;background:#e94560;border-radius:50%;border:2px solid #fff;box-shadow:0 0 4px rgba(233,69,96,0.7)"></div>',
      iconSize: [10, 10],
      iconAnchor: [5, 5],
    });

    // ── Cluster ──────────────────────────────────────────────────
    const cluster = L.markerClusterGroup({
      maxClusterRadius: 40,
      spiderfyOnMaxZoom: true,
      showCoverageOnHover: false,
    });

    let allMarkers = [];
    let allData = [];

    // ── Carregar dados ───────────────────────────────────────────
    fetch('startups_data.json')
      .then(r => r.json())
      .then(data => {
        allData = data;
        buildMarkers(data);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('count').textContent = `${data.length} startups`;
      })
      .catch(err => {
        document.getElementById('loading').innerHTML =
          '<p style="color:#e94560">Erro ao carregar dados. Verifique o arquivo startups_data.json.</p>';
        console.error(err);
      });

    function buildMarkers(data) {
      cluster.clearLayers();
      allMarkers = [];

      data.forEach(s => {
        if (!s.lat || !s.lng) return;

        const marker = L.marker([s.lat, s.lng], { icon });

        const nome = s.nome || s.cnpj || 'Sem nome';
        const area = s.area_atuacao || '—';
        const end  = s.endereco   || '—';
        const dt   = s.data_fundacao || '—';

        marker.bindPopup(`
          <div class="popup-nome">${nome}</div>
          <div class="popup-row">📍 <span>${end}</span></div>
          <div class="popup-row">🏷 <span>${area}</span></div>
          <div class="popup-row">📅 Fundada em <span>${dt}</span></div>
          ${s.cnpj ? `<div class="popup-row">🔢 <span>${s.cnpj}</span></div>` : ''}
        `, { maxWidth: 280 });

        allMarkers.push({ marker, s });
        cluster.addLayer(marker);
      });

      map.addLayer(cluster);
    }

    // ── Busca ────────────────────────────────────────────────────
    let searchTimeout;
    document.getElementById('search').addEventListener('input', function () {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        const q = this.value.trim().toLowerCase();
        if (!q) {
          buildMarkers(allData);
          document.getElementById('count').textContent = `${allData.length} startups`;
          return;
        }
        const filtered = allData.filter(s =>
          (s.nome || '').toLowerCase().includes(q) ||
          (s.area_atuacao || '').toLowerCase().includes(q) ||
          (s.endereco || '').toLowerCase().includes(q) ||
          (s.cnpj || '').includes(q)
        );
        buildMarkers(filtered);
        document.getElementById('count').textContent = `${filtered.length} resultado${filtered.length !== 1 ? 's' : ''}`;
      }, 250);
    });
  </script>
</body>
</html>
